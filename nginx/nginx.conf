# =============================================================================
# SprintMind | nginx/nginx.conf
# Ana Nginx konfigürasyonu — genel ayarlar
# =============================================================================

user  nginx;

# CPU çekirdeği sayısına eşitlenir — 'auto' Docker container'da iyi çalışır
worker_processes  auto;

# Hata logları
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    # Bir worker'ın aynı anda işleyebileceği maksimum bağlantı sayısı
    # 10–30 kullanıcı için 1024 fazlasıyla yeterli
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Log formatı ───────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performans ────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;

    # ── Timeout ayarları ──────────────────────────────────────────────────────
    # SignalR WebSocket bağlantıları uzun süre açık kalır — değerleri yüksek tut
    keepalive_timeout           75s;
    proxy_read_timeout          3600s;   # WebSocket için 1 saat
    proxy_send_timeout          3600s;
    proxy_connect_timeout       10s;

    # ── Boyut sınırları ───────────────────────────────────────────────────────
    # Madde açıklaması ve AI analiz sonuçları için yeterli
    client_max_body_size        10m;
    client_body_buffer_size     128k;

    # ── Gzip sıkıştırma ───────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Güvenlik başlıkları ───────────────────────────────────────────────────
    # Sunucu versiyon bilgisini gizle
    server_tokens  off;

    # ── Site konfigürasyonları ────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}