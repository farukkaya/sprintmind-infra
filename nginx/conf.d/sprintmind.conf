# =============================================================================
# SprintMind | nginx/conf.d/sprintmind.conf
# GEÇİCİ VERSİYON — api servisi hazır olana kadar
#
# Şu an sadece statik dosya servis eder.
# api servisi docker-compose'a eklenince upstream bloğu açılacak.
# =============================================================================

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Güvenlik başlıkları
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Sağlık kontrolü
    location /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type text/plain;
    }

    # Statik dosyalar — agresif cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # React SPA — dosya bulunamazsa index.html döndür
    location / {
        try_files $uri $uri/ /index.html;
    }

